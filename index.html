<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center en Ligne</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.1rem;
            color: #b3b3b3;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        #statusBtn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            border: 2px solid #888888;
            background-color: transparent;
            color: #ffffff;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            outline: none;
        }
        #statusBtn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Call Center en Ligne</h1>
        <p>Bienvenue sur votre espace de travail. Préparez votre casque et connectez-vous pour commencer à recevoir ou passer des appels.</p>
        
        <!-- BOUTON DE STATUT -->
        <button id="statusBtn">⚪ Occupé</button>
        
        <!-- EMPLACEMENT DU WIDGET ZADARMA -->
        <div id="myZadarmaCallmeWidget19143" style="margin-top: 20px;"></div>
    </div>

    <!-- CODE DE L'ÉTAPE 1 ZADARMA (CHARGEMENT DU SCRIPT) -->
    <div id="zadarmaScripts"></div>
    <script>
    (function() {
        var script = document.createElement('script');
        script.src = 'https://my.zadarma.com/callme/v2/19143/';
        document.getElementById('zadarmaScripts').appendChild(script);
    }());
    </script>

    <!-- CODE DU BOUTON DE STATUT (DISPONIBLE / OCCUPÉ) -->
    <script>
        const statusBtn = document.getElementById('statusBtn');

        statusBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Empêche le rechargement de la page
            
            if (statusBtn.innerText.includes("Occupé")) {
                statusBtn.innerHTML = "🟢 Disponible";
                statusBtn.style.backgroundColor = "#22c55e";
                statusBtn.style.borderColor = "#22c55e";
                statusBtn.style.color = "#ffffff";
            } else {
                statusBtn.innerHTML = "⚪ Occupé";
                statusBtn.style.backgroundColor = "transparent";
                statusBtn.style.borderColor = "#888888";
                statusBtn.style.color = "#ffffff";
            }
        });
    </script>

</body>
</html>
